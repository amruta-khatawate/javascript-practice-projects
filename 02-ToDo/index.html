<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>ToDo App</title>
      <link rel="stylesheet" href="styles.css">
</head>
<body>
      <div class="main-container">
            <div class="container">

                        To-Do List
                  </div>

                  <div class="input-container">

                  </div>
        
                  <ul id="tasklist"> </ul>
            </div>
      </div>
      <script src="main.js"></script>
</body>
</html>
