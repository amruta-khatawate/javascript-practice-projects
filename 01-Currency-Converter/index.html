<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Currency Converter</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

      <link rel="stylesheet" href="styles.css">
</head>
<body>
     <div class="container">
            <form class="form" action="">
                  <h3 class="heading">Currency Converter</h3>
                  <div class="inputcontainer">
                        <label for="value">Enter Amount</label>
                        <input class="input" type="text" name="value" value="100">
                  </div>
                  <div class="fromtocontainer">
                        <div class="from">
                              <p>From</p>
                              <div class="dropdown">
                                    <img src="https://flagsapi.com/US/flat/64.png">
                                    <select name="from"></select>
                              </div>
                        </div>
                              <i class="fa-solid fa-arrow-right-arrow-left"></i>
                        <div class="to">
                              <p>To</p>
                              <div class="dropdown">
                                    <img src="https://flagsapi.com/IN/flat/64.png">
                                    <select name="to"></select>
                              </div>
                        </div>
                  </div>
                  <div class="curval">
                        <p class="msg">1 USD = 80 INR</p>
                  </div>
                  <button class="btn" type="submit">Get Exchange Rate</button>
            </form>
     </div>

     <script type="module"  src="main.js"></script>
</body>
</html>
